<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradient for the active glowing Braille dots -->
    <linearGradient id="activeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <!-- Gradient for the concentric haptic waves -->
    <radialGradient id="waveGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0" />
    </radialGradient>
    
    <!-- Glow filter for the dots -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background (solid premium dark cardstock) -->
  <rect width="100" height="100" rx="22" fill="#09090b" />
  
  <!-- Concentric haptic pulse waves (symmetrical, front-facing) -->
  <!-- Large outer pulse gradient -->
  <circle cx="50" cy="50" r="45" fill="url(#waveGrad)" />
  
  <!-- Fine concentric lines for the ripples -->
  <circle cx="50" cy="50" r="44" stroke="#4338ca" stroke-width="1" opacity="0.2" />
  <circle cx="50" cy="50" r="37" stroke="#4f46e5" stroke-width="1.2" opacity="0.3" stroke-dasharray="6 3" />
  <circle cx="50" cy="50" r="30" stroke="#6366f1" stroke-width="1.5" opacity="0.5" />
  <circle cx="50" cy="50" r="23" stroke="#818cf8" stroke-width="1.5" opacity="0.6" stroke-dasharray="10 3" />
  <circle cx="50" cy="50" r="16" stroke="#a5b4fc" stroke-width="1.5" opacity="0.8" />
  
  <!-- Perfect 3x2 Braille cell representing 's' (011100) -->
  <!-- Column 1: x = 38 | Column 2: x = 62 -->
  <!-- Row 1: y = 32 | Row 2: y = 50 | Row 3: y = 68 -->
  
  <!-- Dot 1: Column 1, Row 1 (empty - thin stroke) -->
  <circle cx="38" cy="32" r="4.5" stroke="#312e81" stroke-width="1.5" fill="#0c0a0f" opacity="0.6" />
  
  <!-- Dot 2: Column 1, Row 2 (active - glowing indigo/purple) -->
  <circle cx="38" cy="50" r="6" fill="url(#activeGrad)" filter="url(#neonGlow)" />
  
  <!-- Dot 3: Column 1, Row 3 (active - glowing indigo/purple) -->
  <circle cx="38" cy="68" r="6" fill="url(#activeGrad)" filter="url(#neonGlow)" />
  
  <!-- Dot 4: Column 2, Row 1 (active - glowing indigo/purple) -->
  <circle cx="62" cy="32" r="6" fill="url(#activeGrad)" filter="url(#neonGlow)" />
  
  <!-- Dot 5: Column 2, Row 2 (empty - thin stroke) -->
  <circle cx="62" cy="50" r="4.5" stroke="#312e81" stroke-width="1.5" fill="#0c0a0f" opacity="0.6" />
  
  <!-- Dot 6: Column 2, Row 3 (empty - thin stroke) -->
  <circle cx="62" cy="68" r="4.5" stroke="#312e81" stroke-width="1.5" fill="#0c0a0f" opacity="0.6" />
  
</svg>